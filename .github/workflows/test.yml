name: LY Trinity Sentinel
on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:

jobs:
  sentinel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-id: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    timeout-minutes: 8
    
    steps:
    - name: Run LY Sentinel
      run: |
        python3 << 'PYEOF'
        import os, json, time, ssl, http.client, urllib.request
        
        node_id = "gh-sentinel-" + str(${{ matrix.node-id }}) + "-" + "${{ github.run_id }}"
        ts = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
        
        metrics = {
            "node_id": node_id,
            "status": "alive",
            "node_type": "gh_actions_sentinel",
            "last_heartbeat": ts,
            "metadata": {
                "runner_os": os.environ.get("RUNNER_OS", "linux"),
                "workflow_run": "${{ github.run_id }}",
                "repo": "${{ github.repository }}"
            }
        }
        
        SUPABASE_URL = "https://ojhkxcjvyfvtdsigwbxi.supabase.co/rest/v1/stealth_nodes"
        ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qaGt4Y2p2eWZ2dGRzaWd3YnhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODMxNDQsImV4cCI6MjA5Njc1OTE0NH0.WfBAu30yinVqNr4-sJH-ctyIz4VmM5z7TFqZCIr_u6k"
        
        # Heartbeat to Supabase
        try:
            req = urllib.request.Request(
                SUPABASE_URL,
                data=json.dumps(metrics).encode(),
                headers={
                    "apikey": ANON_KEY,
                    "Authorization": "Bearer " + ANON_KEY,
                    "Content-Type": "application/json",
                    "Prefer": "resolution=merge-duplicates"
                },
                method="POST"
            )
            resp = urllib.request.urlopen(req, timeout=10)
            result = json.loads(resp.read())
            print("SENTINEL|HB_OK|" + node_id + "|" + str(result)[:80])
        except Exception as e:
            print("SENTINEL|HB_FAIL|" + node_id + "|" + str(e)[:100])
        
        # Backup to Vercel
        try:
            ctx = ssl.create_default_context()
            conn = http.client.HTTPSConnection("ly-distilled-node.vercel.app", timeout=5)
            conn.request("POST", "/api/heartbeat",
                body=json.dumps(metrics["metadata"]).encode(),
                headers={"Content-Type": "application/json"})
            print("SENTINEL|VERCEL|" + str(conn.getresponse().status))
            conn.close()
        except Exception:
            print("SENTINEL|VERCEL|UNREACHABLE")
        
        print("SENTINEL|DONE|" + node_id)
        PYEOF
