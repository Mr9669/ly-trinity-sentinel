name: LY Trinity Sentinel
on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - run: echo "LY-TRINITY sentinel $(date) node=test"
    - run: python3 -c "import urllib.request,json; print(json.dumps({"ok":True}))"
