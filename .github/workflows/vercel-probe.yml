name: Vercel Probe
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Probe Vercel endpoints
        run: |
          {
            echo "# Vercel Health Probe"
            echo ""
            echo "Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            echo "## nano-perf-api.vercel.app"
            for ep in "/" "/health" "/api/" "/api/health"; do
              URL="https://nano-perf-api.vercel.app${ep}"
              CODE=$(curl -s -o /tmp/body -w "%{http_code}" --connect-timeout 10 --max-time 15 "$URL" 2>/dev/null || echo "FAIL")
              BODY=$(cat /tmp/body 2>/dev/null | head -c 500)
              echo "- \`${URL}\` -> HTTP ${CODE}"
              echo "  Body: \`${BODY}\`"
            done
            echo ""
            echo "## ly-distilled-node.vercel.app"
            for ep in "/" "/health" "/api" "/api/" "/api/health" "/api/heartbeat"; do
              URL="https://ly-distilled-node.vercel.app${ep}"
              CODE=$(curl -s -o /tmp/body2 -w "%{http_code}" --connect-timeout 10 --max-time 15 "$URL" 2>/dev/null || echo "FAIL")
              BODY=$(cat /tmp/body2 2>/dev/null | head -c 500)
              echo "- \`${URL}\` -> HTTP ${CODE}"
              echo "  Body: \`${BODY}\`"
            done
          } > vercel-health-report.md
          
          cat vercel-health-report.md
      - name: Commit results
        run: |
          git config user.name "ly-sentinel-bot"
          git config user.email "sentinel@ly-trinity.local"
          git add vercel-health-report.md
          git diff --staged --quiet || git commit -m "chore: update Vercel health report [skip ci]"
          git push
