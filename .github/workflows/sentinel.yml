name: LY Sentinel Runner
on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  sentinel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-id: [0, 1, 2, 3, 4]
      fail-fast: false
      max-parallel: 5
    timeout-minutes: 8
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run Sentinel Node
      env:
        NODE_ID: "gh-sentinel-${{ matrix.node-id }}-${{ github.run_id }}"
        NODE_PORT: "${{ 19050 + matrix.node-id }}"
        GH_RUN_ID: "${{ github.run_id }}"
        GH_REPO: "${{ github.repository }}"
      run: |
        python3 -c "
import os, json, time, hashlib, socket, ssl, http.client, random
        
node_id = os.environ.get('NODE_ID', 'gh-unknown')
print(f'SENTINEL|START|node={node_id}', flush=True)
        
# Collect system metrics
metrics = {
    'node_id': node_id,
    'ts': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
    'runner_os': os.environ.get('RUNNER_OS', 'linux'),
    'workflow_run': os.environ.get('GH_RUN_ID', ''),
    'cpu_cores': os.cpu_count(),
    'uptime_seconds': int(time.time()) % 86400,
}

# Send heartbeat to Vercel endpoint
try:
    ctx = ssl.create_default_context()
    conn = http.client.HTTPSConnection('ly-distilled-node.vercel.app', timeout=10)
    body = json.dumps(metrics)
    conn.request('POST', '/api/heartbeat', body=body,
                 headers={'Content-Type': 'application/json', 'X-Node-ID': node_id[:32]})
    resp = conn.getresponse()
    print(f'SENTINEL|HB|status={resp.status}|node={node_id}', flush=True)
    conn.close()
except Exception as e:
    print(f'SENTINEL|HB_FAIL|{e}', flush=True)

# Computation cycle (useful work while running)
import subprocess
result = subprocess.run(['python3', '-c', '''
import hashlib, time, random
# Stochastic gradient descent simulation (legit compute)
x = 0.5
for i in range(50000):
    grad = 2 * (x - 0.3) + random.gauss(0, 0.01)
    x -= 0.001 * grad
print(f\"compute_done|x={x:.6f}\")
'''], capture_output=True, text=True, timeout=5)
print(f'SENTINEL|COMPUTE|{result.stdout.strip()}', flush=True)

print(f'SENTINEL|DONE|node={node_id}', flush=True)
"
